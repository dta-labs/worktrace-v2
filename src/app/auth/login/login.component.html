<div class="container">
  <div class="card">
    <h1>WorkTrace</h1>
    <p class="subtitle">Sign in to continue</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-control" [class.error]="email?.invalid && (email?.touched || email?.dirty)">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com" autocomplete="username"
          data-cy="login-email" />
        @if (email?.hasError('required')) {
        <small data-cy="login-email-required-error">Email is required</small>
        }
        @if (email?.hasError('email')) {
        <small>Invalid email</small>
        }
      </div>

      <div class="form-control" [class.error]="password?.invalid && (password?.touched || password?.dirty)">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password"
          data-cy="login-password" />
        @if (password?.hasError('required')) {
        <small data-cy="login-password-required-error">Password is required</small>
        }
      </div>

      <div class="row between">
        <label class="remember">
          <input type="checkbox" formControlName="remember" />
          Remember me
        </label>
        <a class="link" routerLink="/reset-password">Forgot password?</a>
      </div>

      <button class="btn" [disabled]="loading" data-cy="login-submit" type="submit">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>

      @if (errorMsg) {
      <div class="error-box" data-cy="login-error">
        {{ errorMsg }}
      </div>
      }
    </form>
  </div>
</div>
