<div class="container">
  <div class="card" *ngIf="!message">
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your email to receive a reset link.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-control" [class.error]="form.get('email')?.invalid && (form.get('email')?.touched || form.get('email')?.dirty)">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com" />
        <small *ngIf="form.get('email')?.hasError('required')">Email is required</small>
        <small *ngIf="form.get('email')?.hasError('email')">Invalid email</small>
      </div>

      <button class="btn" [disabled]="loading">
        {{ loading ? 'Sending...' : 'Send reset link' }}
      </button>

      <div class="error-box" *ngIf="error">
        {{ error }}
      </div>

      <button class="link-btn" type="button" (click)="backToLogin()">← Back to login</button>
    </form>
  </div>

  <div class="card success" *ngIf="message">
    <h1>Check your email</h1>
    <p>{{ message }}</p>
    <button class="btn outline" type="button" (click)="backToLogin()">Back to login</button>
  </div>
</div>
