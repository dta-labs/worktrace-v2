<div class="min-h-screen bg-white dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100">
  <header class="fixed w-full top-0 left-0 bg-white/80 dark:bg-neutral-900/70 backdrop-blur border-b border-neutral-200 dark:border-neutral-800 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="text-xl font-bold">WorkTrace</div>
      <div class="flex items-center gap-4">
        <button (click)="toggleDark()" class="text-sm px-3 py-1 rounded-md border border-neutral-300 dark:border-neutral-700">
          {{ isDark ? 'Light' : 'Dark' }} mode
        </button>
        <a routerLink="/login" class="px-4 py-2 rounded-md bg-indigo-600 text-white text-sm">Sign in</a>
      </div>
    </div>
  </header>

  <section class="pt-32 pb-24 text-center px-4">
    <h1 class="text-4xl md:text-6xl font-extrabold leading-tight">
      Manage, assign & evaluate <span class="text-indigo-500">subcontractors</span> with ease
    </h1>
    <p class="mt-6 max-w-2xl mx-auto text-lg opacity-80">
      Real-time evaluations, project assignments, and a clean dashboard built for foremen and admins.
    </p>
    <div class="mt-8 flex justify-center gap-4">
      <a routerLink="/login" class="px-6 py-3 rounded-lg bg-indigo-600 text-white font-medium">Get started</a>
      <a href="#features" class="px-6 py-3 rounded-lg border border-neutral-300 dark:border-neutral-700">See features</a>
    </div>
  </section>
</div>
